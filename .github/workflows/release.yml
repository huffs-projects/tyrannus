name: Release

on:
  release:
    types: [published]

# Node 20 on Actions runners is deprecated; use Node 24 for JS actions (checkout, upload-artifact, etc.).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
          - os: macos-latest
            target: macos-aarch64
          - os: windows-latest
            target: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --locked

      - name: Package
        id: pkg
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          version="${RELEASE_TAG}"
          target="${{ matrix.target }}"
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            archive="tyrannus-${version}-${target}.zip"
            powershell -NoProfile -Command \
              "Compress-Archive -LiteralPath 'target/release/tyrannus.exe' -DestinationPath '${archive}' -Force"
          else
            archive="tyrannus-${version}-${target}.tar.gz"
            mkdir -p bundles
            cp target/release/tyrannus bundles/tyrannus
            chmod +x bundles/tyrannus
            tar -C bundles -czf "${archive}" tyrannus
          fi
          echo "archive=${archive}" >> "${GITHUB_OUTPUT}"

      - uses: actions/upload-artifact@v4
        with:
          name: tyrannus-release-${{ matrix.target }}
          path: ${{ steps.pkg.outputs.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: tyrannus-release-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          generate_release_notes: true
          files: |
            release-assets/*

  bump_homebrew_formula:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew formula
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 scripts/update-homebrew-formula.py "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --formula Formula/tyrannus.rb

      - name: Commit and push
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/tyrannus.rb
          if git diff --cached --quiet; then
            echo "No formula changes; skipping push."
            exit 0
          fi
          git commit -m "homebrew: bump formula for ${RELEASE_TAG}"
          git pull --rebase origin main
          git push origin HEAD:main

  # Publishes tyrannus to the AUR (binary from GitHub Releases linux-x86_64 tarball).
  # Prereqs: AUR package ssh://aur@aur.archlinux.org/tyrannus.git exists; repo secret AUR_SSH_PRIVATE_KEY.
  # Skips remaining steps when the secret is unset (job-level if cannot use secrets.*).
  bump_aur_pkgbuild:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Guard (AUR secret present)
        id: aur
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          if [ -n "$AUR_SSH_PRIVATE_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping AUR bump: AUR_SSH_PRIVATE_KEY is not set."
          fi

      - uses: actions/checkout@v4
        if: steps.aur.outputs.enabled == 'true'
        with:
          ref: main
          fetch-depth: 0

      # Write key to disk: secrets piped to ssh-add often lose the final newline and fail with
      # "error in libcrypto". File + ssh config avoids webfactory/ssh-agent stdin loading.
      - name: Configure SSH for AUR
        if: steps.aur.outputs.enabled == 'true'
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur_ci
          chmod 600 ~/.ssh/aur_ci
          if ! grep -qE '^-----BEGIN .+PRIVATE KEY-----' ~/.ssh/aur_ci; then
            echo "::error::AUR_SSH_PRIVATE_KEY must be the private key (PEM block starting with BEGIN ... PRIVATE KEY), not the .pub file."
            exit 1
          fi
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          {
            echo 'Host aur.archlinux.org'
            echo '  User aur'
            echo '  IdentityFile ~/.ssh/aur_ci'
            echo '  IdentitiesOnly yes'
            echo '  StrictHostKeyChecking yes'
          } >> ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Clone AUR repository
        if: steps.aur.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          git clone "ssh://aur@aur.archlinux.org/tyrannus.git" aur-pkg
          git -C aur-pkg config user.name "github-actions[bot]"
          git -C aur-pkg config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update PKGBUILD
        if: steps.aur.outputs.enabled == 'true'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 scripts/update-aur-pkgbuild.py "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --template contrib/aur/tyrannus.PKGBUILD.in \
            --output aur-pkg/PKGBUILD

      # Regenerate .SRCINFO with Arch tooling (PKGBUILD + SRCINFO required by AUR).
      - name: Generate .SRCINFO
        if: steps.aur.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${GITHUB_WORKSPACE}/aur-pkg:/work" \
            -w /work \
            archlinux:latest \
            bash -lc 'pacman-key --init && pacman-key --populate archlinux && pacman -Sy --noconfirm archlinux-keyring pacman >/dev/null && makepkg --printsrcinfo > .SRCINFO'

      - name: Commit and push to AUR
        if: steps.aur.outputs.enabled == 'true'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          cd aur-pkg
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "No AUR changes; skipping push."
            exit 0
          fi
          git commit -m "aur: bump tyrannus for ${RELEASE_TAG}"
          git pull --rebase origin master
          git push origin master
