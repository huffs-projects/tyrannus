name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
          - os: macos-latest
            target: macos-aarch64
          - os: windows-latest
            target: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --locked

      - name: Package
        id: pkg
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          version="${RELEASE_TAG}"
          target="${{ matrix.target }}"
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            archive="tyrannus-${version}-${target}.zip"
            powershell -NoProfile -Command \
              "Compress-Archive -LiteralPath 'target/release/tyrannus.exe' -DestinationPath '${archive}' -Force"
          else
            archive="tyrannus-${version}-${target}.tar.gz"
            mkdir -p bundles
            cp target/release/tyrannus bundles/tyrannus
            chmod +x bundles/tyrannus
            tar -C bundles -czf "${archive}" tyrannus
          fi
          echo "archive=${archive}" >> "${GITHUB_OUTPUT}"

      - uses: actions/upload-artifact@v4
        with:
          name: tyrannus-release-${{ matrix.target }}
          path: ${{ steps.pkg.outputs.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: tyrannus-release-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          generate_release_notes: true
          files: |
            release-assets/*

  bump_homebrew_formula:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew formula
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 scripts/update-homebrew-formula.py "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --formula Formula/tyrannus.rb

      - name: Commit and push
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/tyrannus.rb
          if git diff --cached --quiet; then
            echo "No formula changes; skipping push."
            exit 0
          fi
          git commit -m "homebrew: bump formula for ${RELEASE_TAG}"
          git pull --rebase origin main
          git push origin HEAD:main
