name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
          - os: macos-latest
            target: macos-aarch64
          - os: windows-latest
            target: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --locked

      - name: Package
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          version="${GITHUB_REF_NAME}"
          target="${{ matrix.target }}"
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            archive="tyrannus-${version}-${target}.zip"
            powershell -NoProfile -Command \
              "Compress-Archive -LiteralPath 'target/release/tyrannus.exe' -DestinationPath '${archive}' -Force"
          else
            archive="tyrannus-${version}-${target}.tar.gz"
            mkdir -p bundles
            cp target/release/tyrannus bundles/tyrannus
            chmod +x bundles/tyrannus
            tar -C bundles -czf "${archive}" tyrannus
          fi
          echo "archive=${archive}" >> "${GITHUB_OUTPUT}"

      - uses: actions/upload-artifact@v4
        with:
          name: tyrannus-release-${{ matrix.target }}
          path: ${{ steps.pkg.outputs.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: tyrannus-release-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/*
